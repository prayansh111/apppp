<!DOCTYPE html>
<html>
<head>
    <title>P2P 100GB Sender</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; }
        input, button { padding: 15px; margin: 10px; border-radius: 8px; border: none; font-size: 18px; }
        button { background: #10b981; color: white; cursor: pointer; width: 250px; }
        progress { width: 100%; height: 25px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📤 Send to Mac</h2>
        <input type="text" id="code" placeholder="6-Digit Code">
        <button id="conn">Connect & Pair</button>
        <div id="ui" style="display:none">
            <input type="file" id="file">
            <progress id="pg" value="0" max="100"></progress>
            <p id="lab">Ready to Transfer</p>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDXUO76dZzB0lnhQIdvlQqhqd43gvd6968",
            authDomain: "fast-file-transfer-9ec05.firebaseapp.com",
            projectId: "fast-file-transfer-9ec05",
            storageBucket: "fast-file-transfer-9ec05.firebasestorage.app",
            messagingSenderId: "91596561473",
            appId: "1:91596561473:web:b4c66adb7fc77ebd1a3ac0"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc;

        document.getElementById('conn').onclick = async () => {
            const code = document.getElementById('code').value;
            const ref = db.collection('rooms').doc(code);
            const snap = await ref.get();
            
            pc.ondatachannel = (e) => {
                dc = e.channel;
                dc.onopen = () => document.getElementById('ui').style.display = 'block';
            };

            await pc.setRemoteDescription(new RTCSessionDescription(snap.data().offer));
            const ans = await pc.createAnswer();
            await pc.setLocalDescription(ans);
            await ref.update({ answer: { sdp: ans.sdp, type: ans.type } });
        };

        document.getElementById('file').onchange = (e) => {
            const f = e.target.files[0];
            dc.send(JSON.stringify({ name: f.name, size: f.size }));
            
            const chunk = 64 * 1024; // 64KB chunks
            let offset = 0;
            const reader = new FileReader();

            reader.onload = (ev) => {
                dc.send(ev.target.result);
                offset += ev.target.result.byteLength;
                document.getElementById('pg').value = (offset/f.size)*100;
                document.getElementById('lab').innerText = `Sending: ${((offset/f.size)*100).toFixed(1)}%`;
                if (offset < f.size) read();
            };
            const read = () => reader.readAsArrayBuffer(f.slice(offset, offset + chunk));
            read();
        };
    </script>
</body>
</html>
